name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "postgresql+psycopg://ci:ci@localhost:5432/ci"
      BETTER_AUTH_SECRET: "ci-dummy-secret-padding-xxxxxxxxxxxxxxxx"
      GEMINI_API_KEY: ""
      CONTACT_ENRICHMENT_PROVIDER: "disabled"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          if find app/tests -name "test_*.py" | grep -q .; then
            pytest app/tests/ -v --tb=short
          else
            echo "::notice::No test files found — tests will appear once the security/focus-hardening PR merges."
          fi

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      BETTER_AUTH_SECRET: "ci-dummy-secret-padding-xxxxxxxxxxxxxxxx"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      RESEND_API_KEY: "re_ci_dummy_key_placeholder"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
