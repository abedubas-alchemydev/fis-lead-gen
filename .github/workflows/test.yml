name: CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Backend Unit (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: "postgresql+psycopg://ci:ci@localhost:5432/ci"
      BETTER_AUTH_SECRET: "ci-dummy-secret-padding-xxxxxxxxxxxxxxxx"
      GEMINI_API_KEY: ""
      CONTACT_ENRICHMENT_PROVIDER: "disabled"
      # Email extractor — dummy values; integration-marked tests are deselected by
      # default via pytest.ini, so these never exercise the real providers in CI.
      HUNTER_API_KEY: ""
      SNOV_CLIENT_ID: ""
      SNOV_CLIENT_SECRET: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          if find app/tests -name "test_*.py" | grep -q .; then
            pytest app/tests/ -m "not integration" -v --tb=short
          else
            echo "::notice::No test files found yet."
          fi

  backend-integration:
    name: Backend Integration (Python 3.11 + Postgres 15)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+psycopg://testuser:testpass@localhost:5432/testdb"
      DATABASE_URL_BACKEND: "postgresql+psycopg://testuser:testpass@localhost:5432/testdb"
      DATABASE_URL_FRONTEND: "postgresql://testuser:testpass@localhost:5432/testdb"
      BETTER_AUTH_SECRET: "ci-test-secret-not-real-do-not-use-in-prod"
      # 39-char placeholder matching ^AIzaSy[A-Za-z0-9_\-]{33}$. Passes the shape
      # validator in services/gemini_responses.py without calling Gemini.
      GEMINI_API_KEY: "AIzaSyCITestFakeKey00000000000000000000"
      OPENAI_API_KEY: "sk-ci-test-fake-not-real"
      APOLLO_API_KEY: "ci-test-fake"
      CONTACT_ENRICHMENT_PROVIDER: "disabled"
      HUNTER_API_KEY: ""
      SNOV_CLIENT_ID: ""
      SNOV_CLIENT_SECRET: ""
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U testuser; then
              echo "Postgres ready"; break
            fi
            sleep 2
          done

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest app/tests/ -m "integration" -v --tb=short

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      BETTER_AUTH_SECRET: "ci-dummy-secret-padding-xxxxxxxxxxxxxxxx"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      RESEND_API_KEY: "re_ci_dummy_key_placeholder"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy (${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }})
    needs: [backend-unit, backend-integration, frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set deploy variables
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=production" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=fis-backend" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=fis-frontend" >> $GITHUB_ENV
            echo "FRONTEND_URL=https://fis.alchemydev.io" >> $GITHUB_ENV
          else
            echo "ENV=staging" >> $GITHUB_ENV
            echo "BACKEND_SERVICE=fis-backend-staging" >> $GITHUB_ENV
            echo "FRONTEND_SERVICE=fis-frontend-staging" >> $GITHUB_ENV
            echo "FRONTEND_URL=https://fis-frontend-staging-136029935063.us-central1.run.app" >> $GITHUB_ENV
          fi

      - name: Build and push backend
        run: |
          docker build \
            -t ${{ vars.GCP_REGISTRY }}/backend:${{ env.SHORT_SHA }} \
            -t ${{ vars.GCP_REGISTRY }}/backend:latest-${{ env.ENV }} \
            -f backend/Dockerfile backend/
          docker push ${{ vars.GCP_REGISTRY }}/backend --all-tags

      - name: Build and push frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=${{ env.FRONTEND_URL }} \
            -t ${{ vars.GCP_REGISTRY }}/frontend:${{ env.SHORT_SHA }} \
            -t ${{ vars.GCP_REGISTRY }}/frontend:latest-${{ env.ENV }} \
            -f frontend/Dockerfile frontend/
          docker push ${{ vars.GCP_REGISTRY }}/frontend --all-tags

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE }} \
            --image=${{ vars.GCP_REGISTRY }}/backend:${{ env.SHORT_SHA }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --labels=commit-sha=${{ env.SHORT_SHA }},environment=${{ env.ENV }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image=${{ vars.GCP_REGISTRY }}/frontend:${{ env.SHORT_SHA }} \
            --region=${{ vars.GCP_REGION }} \
            --project=${{ vars.GCP_PROJECT_ID }} \
            --labels=commit-sha=${{ env.SHORT_SHA }},environment=${{ env.ENV }}
