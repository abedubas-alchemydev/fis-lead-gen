[pytest]
testpaths = app/tests
pythonpath = .
asyncio_mode = auto
# Integration-marked tests require a live Postgres + external provider HTTP; deselect
# from the default run. Opt in with `pytest -m integration`.
addopts = -m "not integration"
markers =
    integration: tests that require live infrastructure (Postgres, external HTTP)
filterwarnings =
    ignore::DeprecationWarning
