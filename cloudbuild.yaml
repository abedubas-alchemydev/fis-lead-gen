steps:
  # 1. Build backend image
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - '${_REGISTRY}/backend:${SHORT_SHA}'
      - -t
      - '${_REGISTRY}/backend:latest-${_ENV}'
      - -f
      - backend/Dockerfile
      - backend/

  # 2. Build frontend image
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - '${_REGISTRY}/frontend:${SHORT_SHA}'
      - -t
      - '${_REGISTRY}/frontend:latest-${_ENV}'
      - -f
      - frontend/Dockerfile
      - frontend/
    waitFor: ['-']

  # 3. Push backend images
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGISTRY}/backend']
    waitFor: ['build-backend']

  # 4. Push frontend images
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_REGISTRY}/frontend']
    waitFor: ['build-frontend']

  # 5. Deploy backend to Cloud Run
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - '${_BACKEND_SERVICE}'
      - --image=${_REGISTRY}/backend:${SHORT_SHA}
      - --region=us-central1
      - --project=fis-lead-gen
      - --labels=commit-sha=${SHORT_SHA},environment=${_ENV}
    waitFor: ['push-backend']

  # 6. Deploy frontend to Cloud Run
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - '${_FRONTEND_SERVICE}'
      - --image=${_REGISTRY}/frontend:${SHORT_SHA}
      - --region=us-central1
      - --project=fis-lead-gen
      - --labels=commit-sha=${SHORT_SHA},environment=${_ENV}
    waitFor: ['push-frontend']

substitutions:
  _REGISTRY: us-central1-docker.pkg.dev/fis-lead-gen/fis-lead-gen
  _ENV: staging
  _BACKEND_SERVICE: fis-backend-staging
  _FRONTEND_SERVICE: fis-frontend-staging

images:
  - '${_REGISTRY}/backend:${SHORT_SHA}'
  - '${_REGISTRY}/frontend:${SHORT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
